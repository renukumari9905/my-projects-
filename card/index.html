<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-Commerce Cards</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="products">
      <div class="card">
        <img
          src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=600"
          alt="Product"
        />
        <h3>Wireless Headphone</h3>
        <p>High quality sound with noise cancellation.</p>
        <h2>₹1,999</h2>
        <button>Buy Now</button>
      </div>

      <div class="card">
        <img
          src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=600"
          alt="Product"
        />
        <h3>Smart Watch</h3>
        <p>Track your fitness and daily activities.</p>
        <h2>₹2,499</h2>
        <button>Buy Now</button>
      </div>

      <div class="card">
        <img
          src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=600"
          alt="Product"
        />
        <h3>Bluetooth Speaker</h3>
        <p>Portable speaker with powerful bass.</p>
        <h2>₹1,299</h2>
        <button>Buy Now</button>
      </div>
    </section>
  </body>
</html>
