<!doctype html>
<html lang="en">
  <head>
    <!-- Meta Information -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Page Title -->
    <title>Fashion Product Cards</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="index3.css" />
  </head>

  <body>
    <!-- Main Content -->
    <main>
      <!-- Products Section -->
      <section class="products">
        <!-- Product Card 1 -->
        <article class="product-card">
          <figure class="product-image">
            <img
              src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500"
              alt="Nike Air Max Running Shoes"
            />
          </figure>

          <section class="product-content">
            <header class="product-header">
              <h4 class="brand">Nike</h4>
              <h3 class="product-title">Air Max Running Shoes</h3>
            </header>

            <p class="product-info">Black • Size 8</p>

            <p class="price">₹1,499</p>

            <footer class="product-footer">
              <button class="btn">Add to Bag</button>
            </footer>
          </section>
        </article>

        <!-- Product Card 2 -->
        <article class="product-card">
          <figure class="product-image">
            <img
              src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500"
              alt="Nike Air Max Running Shoes"
            />
          </figure>

          <section class="product-content">
            <header class="product-header">
              <h4 class="brand">Nike</h4>
              <h3 class="product-title">Air Max Running Shoes</h3>
            </header>

            <p class="product-info">Black • Size 9</p>

            <p class="price">₹1,699</p>

            <footer class="product-footer">
              <button class="btn">Add to Bag</button>
            </footer>
          </section>
        </article>
      </section>
    </main>
  </body>
</html>
